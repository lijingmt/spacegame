<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Game - 太空躲避游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #0a0a1a, #1a1a3a);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
        }

        #gameCanvas {
            display: block;
            border: 3px solid #4a4a8a;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(100, 100, 255, 0.3);
        }

        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 10px;
            color: white;
            text-align: center;
        }

        #startScreen h1, #gameOverScreen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
        }

        #startScreen p, #gameOverScreen p {
            font-size: 18px;
            margin-bottom: 30px;
            color: #aaa;
        }

        .btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(to bottom, #4a9eff, #2060cc);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(74, 158, 255, 0.4);
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(74, 158, 255, 0.6);
        }

        #finalScore {
            font-size: 32px;
            color: #ffff00;
            margin: 20px 0;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="score">分数: 0</div>

        <div id="startScreen">
            <h1>🚀 SPACE GAME</h1>
            <p>点击鼠标让小人物上升，躲避障碍物！</p>
            <p>不点击会自动下滑，碰到障碍物游戏结束</p>
            <button class="btn" onclick="startGame()">开始游戏</button>
        </div>

        <div id="gameOverScreen" class="hidden">
            <h1>💥 游戏结束</h1>
            <div id="finalScore">分数: 0</div>
            <button class="btn" onclick="restartGame()">再来一次</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreElement = document.getElementById('finalScore');

        // 游戏状态
        let gameRunning = false;
        let score = 0;
        let animationId;

        // 玩家对象
        const player = {
            x: 100,
            y: 250,
            width: 40,
            height: 40,
            velocityY: 0,
            gravity: 0.3,
            jumpForce: -7,
            color: '#00ffff'
        };

        // 障碍物数组
        let obstacles = [];
        let obstacleSpeed = 4;
        let obstacleSpawnTimer = 0;
        let obstacleSpawnInterval = 90;

        // 星星背景
        let stars = [];
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 2 + 1
            });
        }

        // 绘制星星背景
        function drawStars() {
            ctx.fillStyle = '#ffffff';
            stars.forEach(star => {
                ctx.globalAlpha = Math.random() * 0.5 + 0.5;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        // 更新星星位置
        function updateStars() {
            stars.forEach(star => {
                star.x -= star.speed;
                if (star.x < 0) {
                    star.x = canvas.width;
                    star.y = Math.random() * canvas.height;
                }
            });
        }

        // 绘制玩家（太空小人）
        function drawPlayer() {
            const x = player.x;
            const y = player.y;

            // 发光效果
            ctx.shadowBlur = 20;
            ctx.shadowColor = player.color;

            // 身体
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(x + player.width/2, y + player.height/2, player.width/2, 0, Math.PI * 2);
            ctx.fill();

            // 面罩
            ctx.fillStyle = '#003366';
            ctx.beginPath();
            ctx.ellipse(x + player.width/2 + 5, y + player.height/2 - 3, 12, 10, 0, 0, Math.PI * 2);
            ctx.fill();

            // 面罩反光
            ctx.fillStyle = '#00ffff';
            ctx.beginPath();
            ctx.ellipse(x + player.width/2 + 8, y + player.height/2 - 5, 4, 3, -0.3, 0, Math.PI * 2);
            ctx.fill();

            // 推进器火焰
            if (player.velocityY < 0) {
                ctx.shadowColor = '#ff6600';
                ctx.fillStyle = '#ff6600';
                const flameLength = 15 + Math.random() * 10;
                ctx.beginPath();
                ctx.moveTo(x - 5, y + player.height/2 + 10);
                ctx.lineTo(x - flameLength, y + player.height/2 + 5);
                ctx.lineTo(x - 5, y + player.height/2);
                ctx.fill();

                ctx.fillStyle = '#ffff00';
                ctx.beginPath();
                ctx.moveTo(x - 5, y + player.height/2 + 8);
                ctx.lineTo(x - flameLength * 0.6, y + player.height/2 + 5);
                ctx.lineTo(x - 5, y + player.height/2 + 2);
                ctx.fill();
            }

            ctx.shadowBlur = 0;
        }

        // 更新玩家位置
        function updatePlayer() {
            // 应用重力
            player.velocityY += player.gravity;
            player.y += player.velocityY;

            // 边界检测
            if (player.y < 0) {
                player.y = 0;
                player.velocityY = 0;
            }
            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
                player.velocityY = 0;
            }
        }

        // 玩家跳跃（点击时）
        function playerJump() {
            if (gameRunning) {
                player.velocityY = player.jumpForce;
            }
        }

        // 生成障碍物
        function spawnObstacle() {
            const type = Math.floor(Math.random() * 3);
            let obstacle;

            switch(type) {
                case 0: // 陨石
                    obstacle = {
                        x: canvas.width,
                        y: Math.random() * (canvas.height - 60) + 30,
                        width: 50 + Math.random() * 30,
                        height: 50 + Math.random() * 30,
                        type: 'meteor',
                        rotation: 0,
                        rotationSpeed: (Math.random() - 0.5) * 0.1
                    };
                    break;
                case 1: // 激光束（上下移动）
                    obstacle = {
                        x: canvas.width,
                        y: Math.random() * (canvas.height - 100) + 50,
                        width: 20,
                        height: 80 + Math.random() * 60,
                        type: 'laser',
                        moveY: (Math.random() - 0.5) * 3
                    };
                    break;
                case 2: // 旋转的卫星
                    obstacle = {
                        x: canvas.width,
                        y: Math.random() * (canvas.height - 80) + 40,
                        width: 60,
                        height: 40,
                        type: 'satellite',
                        rotation: 0,
                        rotationSpeed: 0.05
                    };
                    break;
            }

            obstacles.push(obstacle);
        }

        // 绘制障碍物
        function drawObstacles() {
            obstacles.forEach(obs => {
                ctx.save();
                ctx.translate(obs.x + obs.width/2, obs.y + obs.height/2);

                switch(obs.type) {
                    case 'meteor':
                        ctx.rotate(obs.rotation);
                        // 陨石主体
                        ctx.fillStyle = '#8B4513';
                        ctx.beginPath();
                        ctx.arc(0, 0, obs.width/2, 0, Math.PI * 2);
                        ctx.fill();
                        // 陨石坑
                        ctx.fillStyle = '#654321';
                        ctx.beginPath();
                        ctx.arc(-5, -5, obs.width/6, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(8, 3, obs.width/8, 0, Math.PI * 2);
                        ctx.fill();
                        obs.rotation += obs.rotationSpeed;
                        break;

                    case 'laser':
                        // 激光束
                        ctx.shadowBlur = 15;
                        ctx.shadowColor = '#ff0000';
                        ctx.fillStyle = '#ff0000';
                        ctx.fillRect(-obs.width/2, -obs.height/2, obs.width, obs.height);
                        ctx.fillStyle = '#ffff00';
                        ctx.fillRect(-obs.width/4, -obs.height/2 + 5, obs.width/2, obs.height - 10);
                        ctx.shadowBlur = 0;
                        break;

                    case 'satellite':
                        ctx.rotate(obs.rotation);
                        // 卫星主体
                        ctx.fillStyle = '#cccccc';
                        ctx.fillRect(-15, -10, 30, 20);
                        // 太阳能板
                        ctx.fillStyle = '#3366ff';
                        ctx.fillRect(-45, -8, 25, 16);
                        ctx.fillRect(20, -8, 25, 16);
                        // 天线
                        ctx.strokeStyle = '#999999';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.moveTo(0, -10);
                        ctx.lineTo(0, -20);
                        ctx.stroke();
                        ctx.fillStyle = '#ff0000';
                        ctx.beginPath();
                        ctx.arc(0, -20, 3, 0, Math.PI * 2);
                        ctx.fill();
                        obs.rotation += obs.rotationSpeed;
                        break;
                }

                ctx.restore();
            });
        }

        // 更新障碍物
        function updateObstacles() {
            obstacleSpawnTimer++;
            if (obstacleSpawnTimer >= obstacleSpawnInterval) {
                spawnObstacle();
                obstacleSpawnTimer = 0;
                // 随分数增加难度
                if (obstacleSpawnInterval > 50) {
                    obstacleSpawnInterval -= 0.5;
                }
            }

            obstacles.forEach((obs, index) => {
                obs.x -= obstacleSpeed;

                // 激光上下移动
                if (obs.type === 'laser') {
                    obs.y += obs.moveY;
                    if (obs.y < 20 || obs.y + obs.height > canvas.height - 20) {
                        obs.moveY *= -1;
                    }
                }

                // 移除屏幕外的障碍物
                if (obs.x + obs.width < 0) {
                    obstacles.splice(index, 1);
                    score += 10;
                    scoreElement.textContent = `分数: ${score}`;
                }
            });

            // 随分数增加速度
            obstacleSpeed = 4 + Math.floor(score / 100) * 0.5;
        }

        // 碰撞检测
        function checkCollision() {
            for (let obs of obstacles) {
                // 简化的矩形碰撞检测
                const playerCenterX = player.x + player.width/2;
                const playerCenterY = player.y + player.height/2;
                const obsCenterX = obs.x + obs.width/2;
                const obsCenterY = obs.y + obs.height/2;
                const radiusSum = player.width/2 + Math.min(obs.width, obs.height)/2 - 10;

                const dx = playerCenterX - obsCenterX;
                const dy = playerCenterY - obsCenterY;
                const distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < radiusSum) {
                    return true;
                }
            }
            return false;
        }

        // 绘制背景
        function drawBackground() {
            // 渐变背景
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0a2a');
            gradient.addColorStop(0.5, '#1a1a4a');
            gradient.addColorStop(1, '#0a0a2a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            updateStars();
            drawStars();
        }

        // 游戏主循环
        function gameLoop() {
            if (!gameRunning) return;

            // 清空画布
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 绘制背景
            drawBackground();

            // 更新和绘制玩家
            updatePlayer();
            drawPlayer();

            // 更新和绘制障碍物
            updateObstacles();
            drawObstacles();

            // 碰撞检测
            if (checkCollision()) {
                gameOver();
                return;
            }

            // 分数随时间增加
            score++;
            if (score % 10 === 0) {
                scoreElement.textContent = `分数: ${score}`;
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        // 开始游戏
        function startGame() {
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            // 重置游戏状态
            player.y = 250;
            player.velocityY = 0;
            obstacles = [];
            score = 0;
            obstacleSpawnTimer = 0;
            obstacleSpawnInterval = 90;
            obstacleSpeed = 4;
            scoreElement.textContent = `分数: 0`;

            gameRunning = true;
            gameLoop();
        }

        // 游戏结束
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            finalScoreElement.textContent = `分数: ${score}`;
            gameOverScreen.classList.remove('hidden');
        }

        // 重新开始
        function restartGame() {
            startGame();
        }

        // 鼠标点击事件
        canvas.addEventListener('click', playerJump);

        // 触摸事件（移动端支持）
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            playerJump();
        });

        // 键盘空格键支持
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameRunning) {
                    playerJump();
                } else if (!startScreen.classList.contains('hidden')) {
                    startGame();
                } else if (!gameOverScreen.classList.contains('hidden')) {
                    restartGame();
                }
            }
        });

        // 初始绘制
        drawBackground();
        drawPlayer();
    </script>
</body>
</html>
