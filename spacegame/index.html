<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Space Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a4a 50%, #0a0a2a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* Animated stars background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 56px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 60px #0088ff;
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 18px;
            color: #888;
            letter-spacing: 2px;
        }

        /* Game grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 255, 255, 0.2);
        }

        .game-thumbnail {
            width: 100%;
            height: 200px;
            background: linear-gradient(45deg, #1a1a4a, #2a2a6a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            position: relative;
            overflow: hidden;
        }

        .game-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-thumbnail .placeholder-icon {
            font-size: 80px;
            opacity: 0.5;
        }

        .game-info {
            padding: 20px;
        }

        .game-title {
            font-size: 24px;
            color: #fff;
            margin-bottom: 8px;
        }

        .game-description {
            font-size: 14px;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .game-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-genre {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 12px;
            color: #00ffff;
        }

        .play-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #4a9eff, #2060cc);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .game-card:hover .play-btn {
            background: linear-gradient(135deg, #6aafff, #4080ff);
            transform: scale(1.05);
        }

        /* New game card */
        .game-card.new-game {
            border-style: dashed;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 320px;
            background: rgba(255, 255, 255, 0.02);
        }

        .game-card.new-game:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(0, 255, 255, 0.3);
        }

        .new-game-content {
            text-align: center;
            color: #666;
        }

        .new-game-content .icon {
            font-size: 64px;
            margin-bottom: 15px;
        }

        .new-game-content p {
            font-size: 16px;
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            color: #555;
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 36px;
            }

            .games-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <header>
            <h1>INFINITE SPACE GAME</h1>
            <p class="subtitle" data-zh="无限太空游戏" data-en="INFINITE SPACE GAME">INFINITE SPACE GAME</p>
        </header>

        <div class="games-grid" id="gamesGrid">
            <!-- Games will be loaded dynamically -->
        </div>

        <footer>
            <p data-zh="每一款游戏都是独立的技术栈展示" data-en="Each game showcases different technologies">Each game showcases different technologies</p>
            <p style="margin-top: 10px; color: #444;">infinitespacegame.org</p>
        </footer>
    </div>

    <script>
        // Create animated stars
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // Games list - this will be loaded from a JSON config or API in the future
        const games = [
            {
                id: 'gravity-runner',
                title: 'Gravity Runner',
                titleZh: '重力跑酷',
                description: 'A pixel art endless runner with gravity switching mechanics. Click to flip between floor and ceiling!',
                descriptionZh: '像素艺术无尽跑酷游戏，点击切换地面和天花板躲避尖刺！',
                genre: 'Runner',
                genreZh: '跑酷',
                icon: '🚀',
                color: '#00ffff'
            },
            // Add more games here as they are developed
            // {
            //     id: 'game2',
            //     title: 'Game Title',
            //     titleZh: '游戏标题',
            //     description: 'Game description...',
            //     descriptionZh: '游戏描述...',
            //     genre: 'Genre',
            //     genreZh: '类型',
            //     icon: '🎮',
            //     color: '#ff00ff'
            // }
        ];

        let currentLang = 'en';

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            renderGames();
            document.querySelectorAll('[data-zh]').forEach(el => {
                el.textContent = el.getAttribute(`data-${currentLang}`);
            });
        }

        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';

            // Render existing games
            games.forEach(game => {
                const title = currentLang === 'zh' && game.titleZh ? game.titleZh : game.title;
                const description = currentLang === 'zh' && game.descriptionZh ? game.descriptionZh : game.description;
                const genre = currentLang === 'zh' && game.genreZh ? game.genreZh : game.genre;
                const playText = currentLang === 'zh' ? '开始游戏' : 'PLAY';

                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div class="game-thumbnail" style="background: linear-gradient(135deg, ${game.color}22, ${game.color}44);">
                        <span class="placeholder-icon">${game.icon}</span>
                    </div>
                    <div class="game-info">
                        <h3 class="game-title">${title}</h3>
                        <p class="game-description">${description}</p>
                        <div class="game-meta">
                            <span class="game-genre">${genre}</span>
                            <button class="play-btn">${playText}</button>
                        </div>
                    </div>
                `;
                card.addEventListener('click', () => {
                    window.location.href = `games/${game.id}/`;
                });
                grid.appendChild(card);
            });

            // Add "new game" placeholder card
            const newCard = document.createElement('div');
            newCard.className = 'game-card new-game';
            const newText = currentLang === 'zh' ? '新游戏即将推出...' : 'New Game Coming Soon...';
            newCard.innerHTML = `
                <div class="new-game-content">
                    <div class="icon">🔮</div>
                    <p>${newText}</p>
                </div>
            `;
            grid.appendChild(newCard);
        }

        renderGames();

        // Keyboard shortcut for language toggle (L key)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'l' || e.key === 'L') {
                toggleLanguage();
            }
        });
    </script>
</body>
</html>
