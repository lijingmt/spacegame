<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Infinite Space Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a4a 50%, #0a0a2a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        /* Animated stars background */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 48px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 60px #0088ff;
            margin-bottom: 10px;
            letter-spacing: 4px;
        }

        .subtitle {
            font-size: 16px;
            color: #888;
            letter-spacing: 2px;
        }

        /* Leaderboard Section */
        .leaderboard-section {
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 50px;
            backdrop-filter: blur(10px);
        }

        .leaderboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .leaderboard-title {
            font-size: 28px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .leaderboard-title .trophy {
            font-size: 32px;
        }

        .game-tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .game-tab {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: #aaa;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .game-tab:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(0, 255, 255, 0.3);
        }

        .game-tab.active {
            background: linear-gradient(135deg, #4a9eff, #2060cc);
            border-color: #4a9eff;
            color: white;
        }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
        }

        .leaderboard-table th {
            text-align: left;
            padding: 12px 16px;
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .leaderboard-table td {
            padding: 14px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .leaderboard-table tr:last-child td {
            border-bottom: none;
        }

        .leaderboard-table tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .rank-cell {
            font-weight: bold;
            color: #00ffff;
            width: 60px;
        }

        .rank-1 {
            color: #ffd700;
            font-size: 18px;
        }

        .rank-2 {
            color: #c0c0c0;
            font-size: 16px;
        }

        .rank-3 {
            color: #cd7f32;
            font-size: 16px;
        }

        .name-cell {
            color: #fff;
        }

        .score-cell {
            color: #00ffff;
            font-weight: bold;
            text-align: right;
            font-family: 'Courier New', monospace;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        .empty-leaderboard {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        /* Game grid */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .section-title {
            font-size: 24px;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .game-card:hover {
            transform: translateY(-8px);
            border-color: rgba(0, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 255, 255, 0.2);
        }

        .game-thumbnail {
            width: 100%;
            height: 200px;
            background: linear-gradient(45deg, #1a1a4a, #2a2a6a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            position: relative;
            overflow: hidden;
        }

        .game-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-thumbnail .placeholder-icon {
            font-size: 80px;
            opacity: 0.5;
        }

        .game-info {
            padding: 20px;
        }

        .game-title {
            font-size: 24px;
            color: #fff;
            margin-bottom: 8px;
        }

        .game-description {
            font-size: 14px;
            color: #aaa;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .game-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .game-genre {
            display: inline-block;
            padding: 4px 12px;
            background: rgba(0, 255, 255, 0.2);
            border-radius: 12px;
            font-size: 12px;
            color: #00ffff;
        }

        .play-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #4a9eff, #2060cc);
            border: none;
            border-radius: 20px;
            color: white;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .game-card:hover .play-btn {
            background: linear-gradient(135deg, #6aafff, #4080ff);
            transform: scale(1.05);
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 60px;
            padding: 20px;
            color: #555;
            font-size: 14px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 {
                font-size: 32px;
            }

            .games-grid {
                grid-template-columns: 1fr;
            }

            .leaderboard-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .leaderboard-title {
                font-size: 22px;
            }

            .game-tabs {
                width: 100%;
            }

            .game-tab {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <header>
            <h1>INFINITE SPACE GAME</h1>
            <p class="subtitle" data-zh="无限太空游戏" data-en="INFINITE SPACE GAME">INFINITE SPACE GAME</p>
        </header>

        <!-- Leaderboard Section -->
        <div class="leaderboard-section">
            <div class="leaderboard-header">
                <h2 class="leaderboard-title">
                    <span class="trophy">🏆</span>
                    <span data-zh="排行榜" data-en="Leaderboard">Leaderboard</span>
                </h2>
                <div class="game-tabs" id="gameTabs">
                    <button class="game-tab active" data-game="global" data-zh="总榜" data-en="All Games">All Games</button>
                    <button class="game-tab" data-game="gravity-runner" data-zh="重力跑酷" data-en="Gravity Runner">Gravity Runner</button>
                    <button class="game-tab" data-game="bubble-trouble" data-zh="泡泡麻烦" data-en="Bubble Trouble">Bubble Trouble</button>
                </div>
            </div>
            <div id="leaderboardContent">
                <div class="loading" data-zh="加载中" data-en="Loading">Loading</div>
            </div>
        </div>

        <h2 class="section-title" data-zh="游戏列表" data-en="Games">Games</h2>

        <div class="games-grid" id="gamesGrid">
            <!-- Games will be loaded dynamically -->
        </div>

        <footer>
            <p data-zh="每一款游戏都是独立的技术栈展示" data-en="Each game showcases different technologies">Each game showcases different technologies</p>
            <p style="margin-top: 10px; color: #444;">infinitespacegame.org</p>
        </footer>
    </div>

    <script>
        // Create animated stars
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 2 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();

        // Games list
        const games = [
            {
                id: 'gravity-runner',
                title: 'Gravity Runner',
                titleZh: '重力跑酷',
                description: 'A pixel art endless runner with gravity switching mechanics. Click to flip between floor and ceiling!',
                descriptionZh: '像素艺术无尽跑酷游戏，点击切换地面和天花板躲避尖刺！',
                genre: 'Runner',
                genreZh: '跑酷',
                icon: '🚀',
                color: '#00ffff'
            },
            {
                id: 'bubble-trouble',
                title: 'Bubble Trouble',
                titleZh: '泡泡麻烦',
                description: 'A fun bubble-popping arcade game! Pop bubbles before they trap you. Watch out - big bubbles split into smaller ones!',
                descriptionZh: '有趣的泡泡消除街机游戏！在泡泡困住你之前戳破它们。小心 - 大泡泡会分裂成小泡泡！',
                genre: 'Arcade',
                genreZh: '街机',
                icon: '🫧',
                color: '#ff6b9d'
            },
        ];

        let currentLang = 'en';
        let currentGameTab = 'global';

        // Leaderboard functions
        async function fetchLeaderboard(gameId) {
            try {
                const response = await fetch(`/api/leaderboard/${gameId}`);
                if (!response.ok) throw new Error('Failed to fetch');
                return await response.json();
            } catch (error) {
                console.error('Error fetching leaderboard:', error);
                return [];
            }
        }

        function renderLeaderboard(data) {
            const content = document.getElementById('leaderboardContent');

            if (!data || data.length === 0) {
                const emptyText = currentLang === 'zh' ? '暂无数据' : 'No data yet';
                content.innerHTML = `<div class="empty-leaderboard">${emptyText}</div>`;
                return;
            }

            let html = '<table class="leaderboard-table"><thead><tr>';
            html += `<th data-zh="排名" data-en="Rank">#</th>`;
            html += `<th data-zh="玩家" data-en="Player">Player</th>`;
            html += `<th style="text-align:right" data-zh="分数" data-en="Score">Score</th>`;
            html += '</tr></thead><tbody>';

            data.forEach((entry, index) => {
                const rank = index + 1;
                const rankClass = rank <= 3 ? `rank-${rank}` : '';
                html += `<tr>
                    <td class="rank-cell ${rankClass}">${rank}</td>
                    <td class="name-cell">${escapeHtml(entry.name)}</td>
                    <td class="score-cell">${formatScore(entry.score)}</td>
                </tr>`;
            });

            html += '</tbody></table>';
            content.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatScore(score) {
            if (score >= 1000000) return (score / 1000000).toFixed(1) + 'M';
            if (score >= 1000) return (score / 1000).toFixed(1) + 'K';
            return score.toString();
        }

        async function loadLeaderboard(gameId) {
            const content = document.getElementById('leaderboardContent');
            const loadingText = currentLang === 'zh' ? '加载中' : 'Loading';
            content.innerHTML = `<div class="loading">${loadingText}</div>`;

            const data = await fetchLeaderboard(gameId);
            renderLeaderboard(data);
        }

        // Tab switching
        document.getElementById('gameTabs').addEventListener('click', (e) => {
            if (e.target.classList.contains('game-tab')) {
                document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                currentGameTab = e.target.dataset.game;
                loadLeaderboard(currentGameTab);
            }
        });

        // Language toggle
        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            renderGames();
            updateTabLabels();
            document.querySelectorAll('[data-zh]').forEach(el => {
                el.textContent = el.getAttribute(`data-${currentLang}`);
            });
            loadLeaderboard(currentGameTab);
        }

        function updateTabLabels() {
            document.querySelectorAll('.game-tab').forEach(tab => {
                const game = tab.dataset.game;
                let label;
                if (game === 'global') label = currentLang === 'zh' ? '总榜' : 'All Games';
                else if (game === 'gravity-runner') label = currentLang === 'zh' ? '重力跑酷' : 'Gravity Runner';
                else if (game === 'bubble-trouble') label = currentLang === 'zh' ? '泡泡麻烦' : 'Bubble Trouble';
                tab.textContent = label;
            });
        }

        // Games rendering
        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';

            games.forEach(game => {
                const title = currentLang === 'zh' && game.titleZh ? game.titleZh : game.title;
                const description = currentLang === 'zh' && game.descriptionZh ? game.descriptionZh : game.description;
                const genre = currentLang === 'zh' && game.genreZh ? game.genreZh : game.genre;
                const playText = currentLang === 'zh' ? '开始游戏' : 'PLAY';

                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div class="game-thumbnail" style="background: linear-gradient(135deg, ${game.color}22, ${game.color}44);">
                        <span class="placeholder-icon">${game.icon}</span>
                    </div>
                    <div class="game-info">
                        <h3 class="game-title">${title}</h3>
                        <p class="game-description">${description}</p>
                        <div class="game-meta">
                            <span class="game-genre">${genre}</span>
                            <button class="play-btn">${playText}</button>
                        </div>
                    </div>
                `;
                card.addEventListener('click', () => {
                    window.location.href = `games/${game.id}/`;
                });
                grid.appendChild(card);
            });
        }

        // Initialize
        renderGames();
        loadLeaderboard('global');

        // Keyboard shortcut for language toggle (L key)
        document.addEventListener('keydown', (e) => {
            if (e.key === 'l' || e.key === 'L') {
                toggleLanguage();
            }
        });
    </script>
</body>
</html>
