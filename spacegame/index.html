<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravity Runner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to bottom, #0a0a2a, #1a1a4a);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 1000px;
            height: 600px;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            border: 3px solid #4a4a8a;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(100, 100, 255, 0.3);
        }

        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 10;
        }

        #langBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 100;
        }

        #langBtn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            border-radius: 10px;
            color: white;
            text-align: center;
            padding: 20px;
        }

        #startScreen h1, #gameOverScreen h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #00ffff;
            text-shadow: 0 0 20px #00ffff;
        }

        #startScreen p, #gameOverScreen p {
            font-size: 18px;
            margin-bottom: 15px;
            color: #aaa;
        }

        .btn {
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(to bottom, #4a9eff, #2060cc);
            border: none;
            border-radius: 25px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(74, 158, 255, 0.4);
            margin: 10px;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(74, 158, 255, 0.6);
        }

        #finalScore {
            font-size: 32px;
            color: #ffff00;
            margin: 20px 0;
        }

        .hidden {
            display: none !important;
        }

        #nameInputContainer {
            margin: 20px 0;
        }

        #playerName {
            padding: 12px 20px;
            font-size: 18px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            text-align: center;
            width: 200px;
            outline: none;
            transition: all 0.3s;
        }

        #playerName:focus {
            border-color: #00ffff;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
        }

        #playerName::placeholder {
            color: #888;
        }

        #leaderboard {
            margin-top: 20px;
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-height: 250px;
            overflow-y: auto;
            width: 90%;
            max-width: 400px;
        }

        #leaderboard h3 {
            color: #ffaa00;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 16px;
        }

        .leaderboard-item:last-child {
            border-bottom: none;
        }

        .leaderboard-rank {
            width: 30px;
            color: #888;
            font-weight: bold;
        }

        .leaderboard-rank.top1 { color: #ffd700; }
        .leaderboard-rank.top2 { color: #c0c0c0; }
        .leaderboard-rank.top3 { color: #cd7f32; }

        .leaderboard-name {
            flex: 1;
            text-align: left;
            color: #fff;
            padding-left: 10px;
        }

        .leaderboard-score {
            color: #00ffff;
            font-weight: bold;
        }

        .highscore-badge {
            display: inline-block;
            background: linear-gradient(to bottom, #ffd700, #ff8c00);
            color: #000;
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
            margin-left: 10px;
        }

        .leaderboard-pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-top: 15px;
        }

        .page-btn {
            padding: 5px 15px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .page-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.2);
        }

        .page-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .page-info {
            color: #aaa;
            font-size: 14px;
        }

        #leaderboard::-webkit-scrollbar {
            width: 6px;
        }

        #leaderboard::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        #leaderboard::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }

        #countdown {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            color: #00ffff;
            text-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff;
            animation: pulse 0.5s ease-in-out;
            z-index: 50;
        }

        @keyframes pulse {
            0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        }

        .instructions {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px 25px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: left;
        }

        .instructions p {
            margin: 5px 0;
            color: #88ff88 !important;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1000" height="600"></canvas>
        <button id="langBtn" onclick="toggleLanguage()">中文</button>
        <div id="score">Score: 0</div>
        <div id="countdown" class="hidden"></div>

        <div id="startScreen">
            <h1>🏃 GRAVITY RUNNER</h1>
            <div class="instructions">
                <p data-zh="🎮 玩法说明:" data-en="🎮 How to Play:">🎮 How to Play:</p>
                <p data-zh="• 玩家在地板上奔跑，点击屏幕翻转重力到天花板" data-en="• Player runs on the floor. Click to flip gravity to the ceiling!">• Player runs on the floor. Click to flip gravity to the ceiling!</p>
                <p data-zh="• 躲避地板和天花板上的尖刺障碍物" data-en="• Avoid the spike obstacles on both floor and ceiling!">• Avoid the spike obstacles on both floor and ceiling!</p>
                <p data-zh="• 再点击一次回到地板" data-en="• Click again to return to the floor!">• Click again to return to the floor!</p>
            </div>

            <div id="nameInputContainer">
                <input type="text" id="playerName" maxlength="10" placeholder="Enter your name" data-zh-placeholder="输入你的名字">
            </div>

            <button class="btn" onclick="startGame()" data-zh="开始游戏" data-en="Start Game">Start Game</button>

            <div id="leaderboard">
                <h3 data-zh="🏆 排行榜" data-en="🏆 Leaderboard">🏆 Leaderboard</h3>
                <div id="leaderboardList"></div>
                <div class="leaderboard-pagination">
                    <button class="page-btn" id="prevPageBtn" onclick="prevPage()">◀</button>
                    <span class="page-info" id="pageInfo">1 / 1</span>
                    <button class="page-btn" id="nextPageBtn" onclick="nextPage()">▶</button>
                </div>
            </div>
        </div>

        <div id="gameOverScreen" class="hidden">
            <h1 data-zh="💥 游戏结束" data-en="💥 Game Over">💥 Game Over</h1>
            <div id="finalScore">Score: 0</div>
            <div id="highScoreMessage"></div>
            <button class="btn" onclick="backToMenu()" data-zh="返回菜单" data-en="Back to Menu">Back to Menu</button>
            <button class="btn" onclick="restartGame()" data-zh="再来一次" data-en="Play Again">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const finalScoreElement = document.getElementById('finalScore');
        const langBtn = document.getElementById('langBtn');
        const playerNameInput = document.getElementById('playerName');
        const leaderboardList = document.getElementById('leaderboardList');
        const highScoreMessage = document.getElementById('highScoreMessage');
        const countdownElement = document.getElementById('countdown');

        // Game state
        let gameRunning = false;
        let score = 0;
        let animationId;

        // Leaderboard
        let currentPlayerName = '';
        let isNewHighScore = false;
        let cachedLeaderboard = [];
        let cachedHighScores = {};
        let currentPage = 1;
        const itemsPerPage = 10;

        const API_BASE = '/api';

        // ============ LEADERBOARD FUNCTIONS ============
        async function getLeaderboard() {
            try {
                const response = await fetch(`${API_BASE}/leaderboard`);
                const data = await response.json();
                cachedLeaderboard = Array.isArray(data) ? data : [];
                return cachedLeaderboard;
            } catch (error) {
                console.error('Error fetching leaderboard:', error);
                return cachedLeaderboard;
            }
        }

        async function updateLeaderboard(name, score) {
            try {
                const response = await fetch(`${API_BASE}/leaderboard`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, score })
                });
                const result = await response.json();
                if (result.success) {
                    cachedLeaderboard = result.leaderboard;
                    return result.leaderboard;
                }
            } catch (error) {
                console.error('Error updating leaderboard:', error);
            }
            return cachedLeaderboard;
        }

        async function getPlayerHighScore(name) {
            if (cachedHighScores[name] !== undefined) {
                return cachedHighScores[name];
            }
            try {
                const response = await fetch(`${API_BASE}/highscore/${encodeURIComponent(name)}`);
                const data = await response.json();
                cachedHighScores[name] = data.score;
                return data.score;
            } catch (error) {
                return 0;
            }
        }

        async function checkHighScore(name, score) {
            const highScore = await getPlayerHighScore(name);
            return score > highScore;
        }

        async function renderLeaderboard() {
            const leaderboard = await getLeaderboard();

            if (leaderboard.length === 0) {
                leaderboardList.innerHTML = `<p style="color: #888; font-size: 14px;" data-zh="暂无记录" data-en="No records yet">No records yet</p>`;
                updatePagination(0);
                return;
            }

            const totalPages = Math.ceil(leaderboard.length / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = Math.min(startIndex + itemsPerPage, leaderboard.length);
            const currentPageData = leaderboard.slice(startIndex, endIndex);

            let html = '';
            currentPageData.forEach((entry, index) => {
                const globalIndex = startIndex + index;
                const rankClass = globalIndex === 0 ? 'top1' : globalIndex === 1 ? 'top2' : globalIndex === 2 ? 'top3' : '';
                html += `
                    <div class="leaderboard-item">
                        <span class="leaderboard-rank ${rankClass}">${globalIndex + 1}</span>
                        <span class="leaderboard-name">${entry.name}</span>
                        <span class="leaderboard-score">${entry.score}</span>
                    </div>
                `;
            });

            leaderboardList.innerHTML = html;
            updatePagination(totalPages);
        }

        function updatePagination(totalPages) {
            const pageInfo = document.getElementById('pageInfo');
            const prevBtn = document.getElementById('prevPageBtn');
            const nextBtn = document.getElementById('nextPageBtn');

            if (totalPages === 0) {
                pageInfo.textContent = '0 / 0';
                prevBtn.disabled = true;
                nextBtn.disabled = true;
            } else {
                pageInfo.textContent = `${currentPage} / ${totalPages}`;
                prevBtn.disabled = currentPage === 1;
                nextBtn.disabled = currentPage === totalPages;
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                renderLeaderboard();
            }
        }

        function nextPage() {
            const totalPages = Math.ceil(cachedLeaderboard.length / itemsPerPage);
            if (currentPage < totalPages) {
                currentPage++;
                renderLeaderboard();
            }
        }

        // ============ LANGUAGE ============
        let currentLang = 'en';
        const texts = {
            en: {
                score: 'Score',
                finalScore: 'Score',
                newRecord: '🎉 New Personal Record!',
                yourBest: 'Your Best: '
            },
            zh: {
                score: '分数',
                finalScore: '分数',
                newRecord: '🎉 新个人纪录！',
                yourBest: '你的最高分: '
            }
        };

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'zh' : 'en';
            langBtn.textContent = currentLang === 'en' ? '中文' : 'English';

            document.querySelectorAll('[data-zh]').forEach(el => {
                el.textContent = el.getAttribute(`data-${currentLang}`);
            });

            const nameInput = document.getElementById('playerName');
            nameInput.placeholder = currentLang === 'en' ? 'Enter your name' : '输入你的名字';

            updateScoreDisplay();
            renderLeaderboard();
        }

        function updateScoreDisplay() {
            const label = texts[currentLang].score;
            scoreElement.innerHTML = `${label}: ${score}`;
            finalScoreElement.textContent = `${texts[currentLang].finalScore}: ${score}`;
        }

        async function startCountdown() {
            countdownElement.classList.remove('hidden');
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');

            const countdowns = ['3', '2', '1', 'GO!'];

            for (let i = 0; i < countdowns.length; i++) {
                countdownElement.textContent = countdowns[i];
                countdownElement.style.animation = 'none';
                countdownElement.offsetHeight;
                countdownElement.style.animation = 'pulse 0.5s ease-in-out';
                await new Promise(resolve => setTimeout(resolve, 800));
            }

            countdownElement.classList.add('hidden');
        }

        // ============ GAME VARIABLES ============
        const GROUND_Y = 500;  // Floor position
        const CEILING_Y = 75;  // Ceiling position (player feet when upside down)
        const PLAYER_SIZE = 40;

        let player = {
            x: 150,
            y: GROUND_Y,
            onFloor: true,      // true = on floor, false = on ceiling
            flipping: false,    // currently flipping gravity
            flipProgress: 0,    // 0 to 1
            runFrame: 0         // running animation frame
        };

        let obstacles = [];
        let obstacleSpeed = 4;
        let obstacleSpawnTimer = 0;
        let obstacleSpawnInterval = 100;

        // Background stars
        let stars = [];
        for (let i = 0; i < 80; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 0.5,
                speed: Math.random() * 1.5 + 0.5
            });
        }

        // ============ DRAWING FUNCTIONS ============
        function drawBackground() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#0a0520');
            gradient.addColorStop(0.5, '#150a30');
            gradient.addColorStop(1, '#0a0520');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Stars
            ctx.fillStyle = '#ffffff';
            stars.forEach(star => {
                ctx.globalAlpha = Math.random() * 0.4 + 0.3;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function updateStars() {
            stars.forEach(star => {
                star.x -= star.speed;
                if (star.x < 0) {
                    star.x = canvas.width;
                    star.y = Math.random() * canvas.height;
                }
            });
        }

        function drawFloor() {
            // Floor
            const floorGradient = ctx.createLinearGradient(0, GROUND_Y + PLAYER_SIZE, 0, canvas.height);
            floorGradient.addColorStop(0, '#3a3a5a');
            floorGradient.addColorStop(1, '#2a2a4a');
            ctx.fillStyle = floorGradient;
            ctx.fillRect(0, GROUND_Y + PLAYER_SIZE, canvas.width, canvas.height - GROUND_Y - PLAYER_SIZE);

            // Floor line
            ctx.strokeStyle = '#6a6aaa';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, GROUND_Y + PLAYER_SIZE);
            ctx.lineTo(canvas.width, GROUND_Y + PLAYER_SIZE);
            ctx.stroke();

            // Floor pattern
            ctx.fillStyle = '#4a4a7a';
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.fillRect(i, GROUND_Y + PLAYER_SIZE + 10, 30, 5);
            }
        }

        function drawCeiling() {
            // Ceiling
            const ceilGradient = ctx.createLinearGradient(0, 0, 0, CEILING_Y);
            ceilGradient.addColorStop(0, '#2a2a4a');
            ceilGradient.addColorStop(1, '#3a3a5a');
            ctx.fillStyle = ceilGradient;
            ctx.fillRect(0, 0, canvas.width, CEILING_Y);

            // Ceiling line
            ctx.strokeStyle = '#6a6aaa';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, CEILING_Y);
            ctx.lineTo(canvas.width, CEILING_Y);
            ctx.stroke();

            // Ceiling pattern
            ctx.fillStyle = '#4a4a7a';
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.fillRect(i, CEILING_Y - 15, 30, 5);
            }
        }

        function drawPlayer() {
            ctx.save();

            // Calculate position and rotation
            let drawX = player.x;
            let drawY = player.y;
            let rotation = 0;

            if (player.flipping) {
                // During flip, interpolate position and rotation
                const startY = player.onFloor ? GROUND_Y : CEILING_Y;
                const endY = player.onFloor ? CEILING_Y : GROUND_Y;
                drawY = startY + (endY - startY) * player.flipProgress;
                rotation = player.onFloor ? player.flipProgress * Math.PI : Math.PI + player.flipProgress * Math.PI;
            } else {
                rotation = player.onFloor ? 0 : Math.PI;
            }

            ctx.translate(drawX + PLAYER_SIZE / 2, drawY + PLAYER_SIZE / 2);
            ctx.rotate(rotation);

            // Running animation (leg movement)
            const legOffset = Math.sin(player.runFrame * 0.3) * 5;

            // Body
            ctx.fillStyle = '#00ffff';
            ctx.shadowColor = '#00ffff';
            ctx.shadowBlur = 15;
            ctx.fillRect(-PLAYER_SIZE/2 + 5, -PLAYER_SIZE/2 + 5, PLAYER_SIZE - 10, PLAYER_SIZE - 15);

            // Head
            ctx.beginPath();
            ctx.arc(0, -PLAYER_SIZE/2 + 8, 10, 0, Math.PI * 2);
            ctx.fill();

            // Eye
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(5, -PLAYER_SIZE/2 + 6, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(6, -PLAYER_SIZE/2 + 5, 1, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillStyle = '#00ffff';

            // Legs
            ctx.fillRect(-8, PLAYER_SIZE/2 - 12 + legOffset, 6, 15);
            ctx.fillRect(2, PLAYER_SIZE/2 - 12 - legOffset, 6, 15);

            // Arms
            ctx.fillRect(-PLAYER_SIZE/2 - 2, -5 + legOffset * 0.5, 6, 12);
            ctx.fillRect(PLAYER_SIZE/2 - 4, -5 - legOffset * 0.5, 6, 12);

            ctx.shadowBlur = 0;
            ctx.restore();
        }

        function drawSpike(x, y, width, height, pointingUp) {
            const numSpikes = Math.floor(width / 25);

            ctx.fillStyle = '#ff4444';
            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 2;
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 10;

            for (let i = 0; i < numSpikes; i++) {
                const spikeX = x + i * 25;
                ctx.beginPath();
                if (pointingUp) {
                    ctx.moveTo(spikeX, y + height);
                    ctx.lineTo(spikeX + 12, y);
                    ctx.lineTo(spikeX + 25, y + height);
                } else {
                    ctx.moveTo(spikeX, y);
                    ctx.lineTo(spikeX + 12, y + height);
                    ctx.lineTo(spikeX + 25, y);
                }
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }

            ctx.shadowBlur = 0;
        }

        function drawObstacles() {
            obstacles.forEach(obs => {
                if (obs.onFloor) {
                    // Spike on floor
                    drawSpike(obs.x, GROUND_Y + PLAYER_SIZE - obs.height, obs.width, obs.height, true);
                } else {
                    // Spike on ceiling
                    drawSpike(obs.x, CEILING_Y, obs.width, obs.height, false);
                }
            });
        }

        // ============ GAME LOGIC ============
        function flipGravity() {
            if (!player.flipping && gameRunning) {
                player.flipping = true;
                player.flipProgress = 0;
            }
        }

        function updatePlayer() {
            // Running animation
            player.runFrame++;

            // Handle flipping
            if (player.flipping) {
                player.flipProgress += 0.08;
                if (player.flipProgress >= 1) {
                    player.flipProgress = 0;
                    player.flipping = false;
                    player.onFloor = !player.onFloor;
                    player.y = player.onFloor ? GROUND_Y : CEILING_Y;
                }
            }
        }

        function spawnObstacle() {
            const minWidth = 50;
            const maxWidth = 150;
            const minSpikeHeight = 30;
            const maxSpikeHeight = 50;

            // Randomly choose floor or ceiling
            const onFloor = Math.random() < 0.5;

            obstacles.push({
                x: canvas.width,
                y: onFloor ? GROUND_Y + PLAYER_SIZE : CEILING_Y,
                width: minWidth + Math.random() * (maxWidth - minWidth),
                height: minSpikeHeight + Math.random() * (maxSpikeHeight - minSpikeHeight),
                onFloor: onFloor,
                passed: false
            });
        }

        function updateObstacles() {
            obstacleSpawnTimer++;
            if (obstacleSpawnTimer >= obstacleSpawnInterval) {
                spawnObstacle();
                obstacleSpawnTimer = 0;
            }

            obstacles.forEach((obs, index) => {
                obs.x -= obstacleSpeed;

                // Remove when off screen
                if (obs.x + obs.width < 0) {
                    obstacles.splice(index, 1);
                    score += 10;
                    updateScoreDisplay();
                }
            });

            // Gradually increase speed
            if (score > 0 && score % 100 === 0) {
                obstacleSpeed = Math.min(8, 4 + score / 500);
            }
        }

        function checkCollision() {
            const playerLeft = player.x + 5;
            const playerRight = player.x + PLAYER_SIZE - 5;
            const playerFeetY = player.onFloor || (player.flipping && player.flipProgress < 0.5) ?
                GROUND_Y + PLAYER_SIZE : CEILING_Y;

            for (let obs of obstacles) {
                // Horizontal overlap
                if (playerRight > obs.x && playerLeft < obs.x + obs.width) {
                    // Check if player is on the same surface as the spike
                    if (obs.onFloor) {
                        // Spike is on floor - player dies if on floor
                        if (player.onFloor || (player.flipping && player.flipProgress < 0.5)) {
                            return true;
                        }
                    } else {
                        // Spike is on ceiling - player dies if on ceiling
                        if (!player.onFloor || (player.flipping && player.flipProgress >= 0.5)) {
                            return true;
                        }
                    }
                }
            }
            return false;
        }

        function gameLoop() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();
            drawCeiling();
            drawFloor();
            updateStars();
            drawObstacles();
            updateObstacles();
            updatePlayer();
            drawPlayer();

            if (checkCollision()) {
                gameOver();
                return;
            }

            // Score increases with time
            score++;
            if (score % 10 === 0) {
                updateScoreDisplay();
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        // ============ GAME STATE FUNCTIONS ============
        async function startGame() {
            const name = playerNameInput.value.trim() || 'Player';
            currentPlayerName = name;

            await startCountdown();

            // Reset game
            player.x = 150;
            player.y = GROUND_Y;
            player.onFloor = true;
            player.flipping = false;
            player.flipProgress = 0;
            player.runFrame = 0;

            obstacles = [];
            score = 0;
            obstacleSpeed = 4;
            obstacleSpawnTimer = 0;
            updateScoreDisplay();

            gameRunning = true;
            gameLoop();
        }

        async function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);

            const currentHighScore = await getPlayerHighScore(currentPlayerName);
            isNewHighScore = score > currentHighScore;

            await updateLeaderboard(currentPlayerName, score);
            cachedHighScores[currentPlayerName] = score;

            finalScoreElement.textContent = `${texts[currentLang].finalScore}: ${score}`;

            if (isNewHighScore && score > 0) {
                highScoreMessage.innerHTML = `<span class="highscore-badge">${texts[currentLang].newRecord}</span>`;
            } else {
                highScoreMessage.innerHTML = `<span style="color: #888;">${texts[currentLang].yourBest}${currentHighScore}</span>`;
            }

            gameOverScreen.classList.remove('hidden');
        }

        async function restartGame() {
            gameOverScreen.classList.add('hidden');
            await startCountdown();

            player.x = 150;
            player.y = GROUND_Y;
            player.onFloor = true;
            player.flipping = false;
            player.flipProgress = 0;
            player.runFrame = 0;

            obstacles = [];
            score = 0;
            obstacleSpeed = 4;
            obstacleSpawnTimer = 0;
            updateScoreDisplay();

            gameRunning = true;
            gameLoop();
        }

        async function backToMenu() {
            gameOverScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            await renderLeaderboard();
        }

        // ============ INPUT HANDLERS ============
        canvas.addEventListener('click', flipGravity);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            flipGravity();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameRunning) {
                    flipGravity();
                } else if (!startScreen.classList.contains('hidden')) {
                    startGame();
                } else if (!gameOverScreen.classList.contains('hidden')) {
                    restartGame();
                }
            }
        });

        // Initial render
        drawBackground();
        drawCeiling();
        drawFloor();
        renderLeaderboard();
    </script>
</body>
</html>
